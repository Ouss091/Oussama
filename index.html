
<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>منصة الأستاذ بالأقسام الخاصة — تسجيل الدخول</title>
<link href="styles.css" rel="stylesheet"/>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">وزارة</div>
    <div>
      <div style="font-weight:800">منصة الأستاذ بالأقسام الخاصة</div>
      <small>واجهة تسجيل الدخول</small>
    </div>
  </div>
  <nav>
    <a href="index.html">تسجيل</a>
    <a href="teacher.html">البيانات</a>
    <a href="students.html">التلاميذ</a>
  </nav>
  <div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">Français</button>
  </div>
</header>

<div class="container">
  <div class="hero card">
    <h2 id="t1">مرحبًا بك 👋</h2>
    <p id="t2">أدخل اسم المستخدم وكلمة المرور للولوج إلى منصتك. يمكنك استعمال هذه الواجهة للتجربة (محفوظة محليًا).</p>
  </div>

  <div class="card">
    <h3 id="t3">تسجيل الدخول</h3>
    <div class="grid">
      <div>
        <label id="luser">اسم المستخدم</label>
        <input id="username" placeholder="prof.ahmed">
      </div>
      <div>
        <label id="lpass">كلمة المرور</label>
        <input id="password" type="password" placeholder="••••••••">
      </div>
    </div>
    <button class="btn" style="margin-top:12px" onclick="login()" id="btnlogin">دخول</button>
    <span class="badge" id="loginInfo" style="display:none">تم الدخول!</span>
  </div>
</div>

<footer>© وزارة التضامن الوطني — نسخة واجهة تجريبية (لا تتضمن خادمًا/قاعدة بيانات).</footer>
<script src="app.js"></script>
</body>
</html>
